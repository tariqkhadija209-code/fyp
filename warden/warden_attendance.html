<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Attendance - Warden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .sidebar { height: 100vh; background: #34495e; color: white; position: fixed; width: 250px; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 15px 20px; border-bottom: 1px solid #2c3e50; }
        .main-content { margin-left: 250px; padding: 30px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center py-4">Warden Panel</h4>
        <a href="warden_dashboard.html">Overview</a>
        <a href="warden_attendance.html" class="bg-warning">View Attendance</a>
        <a href="warden_mess.html">Manage Mess</a>
        <a href="../login.html" class="text-danger mt-5">Logout</a>
    </div>

    <div class="main-content">
        <h3>Daily Attendance Records</h3>
        <table class="table bg-white shadow-sm mt-4">
            <thead class="table-dark">
                <tr><th>Date</th><th>Student ID</th><th>Status</th></tr>
            </thead>
            <tbody id="attendance-list"></tbody>
        </table>
    </div>

    <script>
        async function loadAttendance() {
            const res = await fetch('http://127.0.0.1:8000/warden/attendance');
            const list = await res.json();
            document.getElementById('attendance-list').innerHTML = list.map(a => `
                <tr><td>${a.marked_date}</td><td>${a.student_id}</td>
                <td><span class="badge ${a.status==='Present'?'bg-success':'bg-danger'}">${a.status}</span></td></tr>
            `).join('');
        }
        loadAttendance();
    </script>
</body>
</html>
