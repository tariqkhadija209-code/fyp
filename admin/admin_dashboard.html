<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - HostelFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { height: 100vh; background: #2C3E50; color: white; position: fixed; width: 250px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 20px; border-bottom: 1px solid #34495e; transition: 0.3s; }
        .sidebar a:hover { background: #1abc9c; color: white; padding-left: 25px; }
        .main-content { margin-left: 250px; padding: 30px; }
        .card-stat { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; }
        .card-stat:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center py-4 text-white">Admin Panel</h4>
        <a href="admin_dashboard.html"><i class="bi bi-speedometer2 me-2"></i> Overview</a>
        <a href="admin_rooms.html"><i class="bi bi-door-open me-2"></i> Room Management</a>
        <a href="admin_fees.html"><i class="bi bi-cash-coin me-2"></i> Fee Verification</a>
        <a href="admin_complaints.html"><i class="bi bi-exclamation-triangle me-2"></i> Complaints View</a>
        <a href="../login.html" class="text-danger mt-5"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <h2 class="mb-4">System Overview</h2>
        <div class="row g-4 text-center">
            <div class="col-md-4">
                <div class="card card-stat p-4 bg-white border-start border-primary border-5">
                    <h6 class="text-muted text-uppercase small fw-bold">Total Rooms</h6>
                    <h2 id="rooms-count" class="display-6 fw-bold text-primary">--</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-stat p-4 bg-white border-start border-danger border-5">
                    <h6 class="text-muted text-uppercase small fw-bold">Pending Complaints</h6>
                    <h2 id="complaints-count" class="display-6 fw-bold text-danger">--</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-stat p-4 bg-white border-start border-success border-5">
                    <h6 class="text-muted text-uppercase small fw-bold">Total Revenue</h6>
                    <h2 id="fees-total" class="display-6 fw-bold text-success">--</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const res = await fetch('http://127.0.0.1:8000/admin/stats');
                const data = await res.json();
                document.getElementById('rooms-count').innerText = data.total_rooms;
                document.getElementById('complaints-count').innerText = data.pending_complaints;
                document.getElementById('fees-total').innerText = "Rs. " + data.total_revenue;
            } catch (e) { console.error("Stats load failed"); }
        }
        loadStats();
    </script>
</body>
</html>
