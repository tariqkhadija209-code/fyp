<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Room Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f4f7f6;
        }

        .sidebar {
            height: 100vh;
            background: #2C3E50;
            color: white;
            position: fixed;
            width: 250px;
        }

        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            display: block;
            padding: 15px 20px;
            border-bottom: 1px solid #34495e;
        }

        .sidebar a:hover {
            background: #1abc9c;
            color: white;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4 class="text-center py-4">Admin Panel</h4>
        <a href="admin_dashboard.html">Overview</a>
        <a href="admin_rooms.html" class="bg-primary text-white">Room Management</a>
        <a href="admin_fees.html">Fee Verification</a>
        <a href="admin_complaints.html">Complaints View</a>
        <a href="../login.html" class="text-danger mt-5">Logout</a>
    </div>

    <div class="main-content">
        <h3>Add New Room</h3>
        <div class="card p-4 border-0 shadow-sm mb-4">
            <form id="addRoomForm" class="row g-3">
                <div class="col-md-5">
                    <input type="text" name="room_no" class="form-control" placeholder="Room Number (e.g. 101)"
                        required>
                </div>
                <div class="col-md-4">
                    <select name="capacity" class="form-select">
                        <option value="1">Single (1)</option>
                        <option value="2">Double (2)</option>
                        <option value="3">Triple (3)</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="text" name="block" class="form-control" placeholder="Block (e.g. A)" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">Save Room</button>
                </div>
            </form>
        </div>

        <h3>Room List</h3>
        <table class="table bg-white rounded shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Room No</th>
                    <th>Capacity</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="room-list"></tbody>
        </table>
    </div>

    <script>
        document.getElementById('addRoomForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            formData.append("status", "Available");
            const res = await fetch('http://127.0.0.1:8000/admin/add-room', { method: 'POST', body: formData });
            if (res.ok) { alert("Room Added!"); location.reload(); }
        };

        async function loadRooms() {
            const res = await fetch('http://127.0.0.1:8000/admin/rooms');
            const rooms = await res.json();
            document.getElementById('room-list').innerHTML = rooms.map(r => `
                <tr><td>${r.room_no}</td><td>${r.capacity}</td><td>${r.status}</td></tr>
            `).join('');
        }
        loadRooms();
    </script>
</body>

</html>
