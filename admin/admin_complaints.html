<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Complaints - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; position: fixed; width: 250px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 20px; border-bottom: 1px solid #34495e; }
        .sidebar a:hover { background: #1abc9c; color: white; }
        .main-content { margin-left: 250px; padding: 30px; }
        .table-card { background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: none; }
        .btn-resolve { border-radius: 20px; font-size: 0.8rem; transition: 0.3s; }
        .btn-resolve:hover { background: #1abc9c; color: white; border-color: #1abc9c; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center py-4">Admin Panel</h4>
        <a href="admin_dashboard.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
        <a href="admin_rooms.html"><i class="bi bi-door-open me-2"></i> Manage Rooms</a>
        <a href="admin_fees.html">Fee Verification</a>
        <a href="admin_complaints.html" class="bg-primary text-white"><i class="bi bi-chat-left-text me-2"></i> Complaints</a>
        <a href="../login.html" class="text-danger mt-5"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <h2 class="mb-4">Student Complaints</h2>
        
        <div class="card table-card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr class="py-3">
                            <th class="ps-4">Student Name</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Priority</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="complaint-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadComplaints() {
            try {
                const res = await fetch('http://127.0.0.1:8000/admin/complaints');
                const data = await res.json();
                const tbody = document.getElementById('complaint-table-body');
                
                if(data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='5' class='text-center py-5 text-muted'>All issues resolved! No pending complaints.</td></tr>";
                    return;
                }

                tbody.innerHTML = data.map(c => `
                    <tr>
                        <td class="ps-4"><strong>${c.student_name || 'Student'}</strong> <br><small class="text-muted">ID: ${c.student_id}</small></td>
                        <td><span class="badge bg-light text-dark">${c.complaint_type}</span></td>
                        <td style="max-width: 300px;">${c.description}</td>
                        <td><span class="badge ${c.priority === 'High' ? 'bg-danger' : 'bg-warning'}">${c.priority}</span></td>
                        <td class="text-center">
                            <button class="btn btn-outline-secondary btn-resolve px-3" onclick="resolveComplaint(${c.complaint_id})">
                                <i class="bi bi-check2-circle me-1"></i> Unresolved
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Error:", error);
            }
        }

        async function resolveComplaint(id) {
            if(confirm("Mark this as Resolved? It will be removed from records.")) {
                const res = await fetch(`http://127.0.0.1:8000/admin/resolve-complaint/${id}`, {
                    method: 'DELETE'
                });
                const result = await res.json();
                if(result.status === "success") {
                    loadComplaints(); // Refresh list
                }
            }
        }

        loadComplaints();
    </script>
</body>
</html>
