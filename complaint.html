<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Complaint - HostelFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow border-0">
                    <h3 class="mb-4">Register a Complaint</h3>
                    <form id="complaintForm">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" placeholder="e.g. Fan not working" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="4" placeholder="Describe your issue in detail... AI will analyze the urgency." required></textarea>
                        </div>
                        <div class="alert alert-info py-2 small">
                            💡 Our AI model will automatically set priority based on your description.
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Submit Complaint</button>
                        <a href="student_dashboard.html" class="btn btn-link w-100 mt-2">Back to Dashboard</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
