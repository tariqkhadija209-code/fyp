<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - HostelFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background: #1c2938; color: white; position: fixed; width: 250px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 15px 20px; border-bottom: 1px solid #2c3e50; }
        .sidebar a:hover, .sidebar a.active { background: #3498db; color: white; }
        .main-content { margin-left: 250px; padding: 30px; }
        .welcome-card { background: linear-gradient(135deg, #3498db, #1abc9c); color: white; border: none; border-radius: 15px; }
        .notif-box { max-height: 300px; overflow-y: auto; background: white; border-radius: 12px; padding: 15px; }
        .notif-item { border-left: 4px solid #3498db; background: #f8f9fa; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center py-4">Student Panel</h4>
        <a href="student_dashboard.html" class="active"><i class="bi bi-house-door me-2"></i> Home</a>
        <a href="student_attendance.html"><i class="bi bi-calendar-check me-2"></i> Attendance</a>
        <a href="student_mess.html"><i class="bi bi-egg-fried me-2"></i>Mess Menu</a>
        <a href="student_fees.html"><i class="bi bi-credit-card me-2"></i> Fee Status</a>
        <a href="student_complaints.html"><i class="bi bi-chat-dots me-2"></i> My Complaints</a>
        <a href="../login.html" class="text-danger mt-5"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="card welcome-card p-4 mb-4 shadow">
            <h2 id="student-name">Welcome, Student!</h2>
            <p>Always stay updated with hostel announcements.</p>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="card p-4 border-0 shadow-sm">
                    <h5><i class="bi bi-bell me-2"></i> Recent Notifications</h5>
                    <hr>
                    <div id="notif-list" class="notif-box">
                        <p class="text-muted small">Loading alerts...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card p-4 border-0 shadow-sm mb-4">
                    <h6><i class="bi bi-info-circle me-2"></i> Today's Mess</h6>
                    <div id="mess-summary" class="mt-2 fw-bold text-primary">Loading...</div>
                </div>
                <div class="card p-4 border-0 shadow-sm bg-light">
                    <p class="small mb-0"><strong>Status:</strong> Your room allocation is active.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) document.getElementById('student-name').innerText = `Welcome, ${user.username}!`;

        // Load Notifications from DB
        async function loadNotifications() {
            const res = await fetch('http://127.0.0.1:8000/student/notifications');
            const data = await res.json();
            const list = document.getElementById('notif-list');
            
            if(data.length === 0) {
                list.innerHTML = "<p class='text-muted small'>No new announcements.</p>";
                return;
            }

            list.innerHTML = data.map(n => `
                <div class="notif-item shadow-sm">
                    <div class="fw-bold" style="color: #2c3e50;">${n.title}</div>
                    <div class="small text-secondary">${n.message}</div>
                    <div style="font-size: 0.7rem; color: #95a5a6;" class="mt-1">${new Date(n.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // Load Mess Summary
        async function loadQuickMess() {
            const res = await fetch('http://127.0.0.1:8000/warden/menu');
            const data = await res.json();
            if(data.length > 0) {
                document.getElementById('mess-summary').innerText = `${data[0].meal_type}: ${data[0].dish_name}`;
            } else {
                document.getElementById('mess-summary').innerText = "Menu not set";
            }
        }

        loadNotifications();
        loadQuickMess();
    </script>
</body>
</html>
