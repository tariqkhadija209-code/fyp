<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Fees - HostelFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background: #1c2938; color: white; position: fixed; width: 250px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 15px 20px; border-bottom: 1px solid #2c3e50; }
        .sidebar a:hover { background: #3498db; color: white; }
        .main-content { margin-left: 250px; padding: 40px; }
        .fee-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; }
    </style>
</head>
<body>
     <div class="sidebar">
        <h4 class="text-center py-4">Student Panel</h4>
        <a href="student_dashboard.html">Home</a>
        <a href="student_attendance.html">Attendance</a>
        <a href="student_mess.html">Mess Menu</a>
        <a href="student_fees.html" class="bg-primary text-white">Fee Status</a>
        <a href="student_complaints.html">My Complaints</a>
        <a href="../login.html" class="text-danger mt-5">Logout</a>
    </div>

    <div class="main-content">
        <h2>My Fee History</h2>
        <div class="card fee-card p-4 mt-4">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr><th>Month</th><th>Type</th><th>Amount</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="fee-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadFees() {
            const user = JSON.parse(localStorage.getItem('user'));
            const res = await fetch(`http://127.0.0.1:8000/student/fees/${user.user_id}`);
            const data = await res.json();
            document.getElementById('fee-table-body').innerHTML = data.map(f => `
                <tr>
                    <td>${f.billing_month}</td>
                    <td>${f.fee_type}</td>
                    <td>Rs. ${f.amount}</td>
                    <td><span class="badge ${f.status === 'Paid' ? 'bg-success' : (f.status === 'Pending' ? 'bg-warning' : 'bg-danger')}">${f.status}</span></td>
                    <td>
                        ${f.status === 'Unpaid' ? `<button class="btn btn-primary btn-sm" onclick="payNow(${f.fee_id})">Pay Now</button>` : 
                        (f.status === 'Pending' ? '<small>Waiting for Approval</small>' : '<span class="text-success small">Cleared</span>')}
                    </td>
                </tr>
            `).join('');
        }

        async function payNow(feeId) {
            const tid = prompt("Enter JazzCash/Bank Transaction ID:");
            if(tid) {
                const fd = new FormData(); fd.append("fee_id", feeId); fd.append("trans_id", tid);
                await fetch('http://127.0.0.1:8000/student/submit-payment', {method: 'POST', body: fd});
                alert("Submitted! Wait for Admin approval."); loadFees();
            }
        }
        loadFees();
    </script>
</body>
</html>
