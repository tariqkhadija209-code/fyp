<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar { height: 100vh; background: #1c2938; color: white; position: fixed; width: 250px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 15px 20px; border-bottom: 1px solid #2c3e50; }
        .main-content { margin-left: 250px; padding: 30px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center py-4">Student Panel</h4>
        <a href="student_dashboard.html">Home</a>
        <a href="student_attendance.html" class="bg-primary text-white">Attendance</a>
        <a href="student_mess.html"><i class="bi bi-egg-fried me-2"></i>Mess Menu</a>
        <a href="student_fees.html">Fee Status</a>
        <a href="student_complaints.html">My Complaints</a>
        <a href="../login.html" class="text-danger mt-5">Logout</a>
       
    </div>

    <div class="main-content">
        <h3>Daily Presence</h3>
        <div class="card p-5 text-center shadow-sm border-0 mt-4">
            <h4 id="date-now"></h4>
            <button id="att-btn" class="btn btn-success btn-lg w-50 mx-auto mt-3" onclick="markPresent()">
                Mark Me Present
            </button>
            <div id="msg" class="mt-3 fw-bold"></div>
        </div>
    </div>

    <script>
        document.getElementById('date-now').innerText = new Date().toDateString();
        async function markPresent() {
            const user = JSON.parse(localStorage.getItem('user'));
            const formData = new FormData();
            formData.append("student_id", user.user_id); // User ID as Student ID reference

            const res = await fetch('http://127.0.0.1:8000/student/mark-attendance', { method: 'POST', body: formData });
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('msg').innerText = "✅ Attendance Marked!";
                document.getElementById('att-btn').disabled = true;
            } else {
                document.getElementById('msg').innerText = "❌ Already marked today.";
            }
        }
    </script>
</body>
</html>
