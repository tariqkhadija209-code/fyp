<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mess Menu - Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; }
        .sidebar { height: 100vh; background: #1c2938; color: white; position: fixed; width: 250px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 15px 20px; border-bottom: 1px solid #2c3e50; }
        .sidebar a:hover { background: #3498db; color: white; }
        .main-content { margin-left: 250px; padding: 30px; }
        .menu-card { border: none; border-radius: 12px; transition: 0.3s; }
        .menu-card:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center py-4 text-white">Student Panel</h4>
        <a href="student_dashboard.html">Home</a>
        <a href="student_attendance.html">Attendance</a>
        <a href="student_mess.html" class="bg-primary text-white">Mess Menu</a>
        <a href="student_fees.html">Fee Status</a>
        <a href="student_complaints.html">My Complaints</a>
        <a href="../login.html" class="text-danger mt-5">Logout</a>
    </div>

    <div class="main-content">
        <h3 class="mb-4"><i class="bi bi-egg-fried me-2"></i> Weekly Mess Menu</h3>
        <div class="row g-3" id="mess-list">
            </div>
    </div>

    <script>
        async function loadMess() {
            const res = await fetch('http://127.0.0.1:8000/warden/menu');
            const data = await res.json();
            const list = document.getElementById('mess-list');
            
            if(data.length === 0) {
                list.innerHTML = "<p class='text-muted'>No menu updated by warden yet.</p>";
                return;
            }

            list.innerHTML = data.map(m => `
                <div class="col-md-4">
                    <div class="card menu-card shadow-sm p-3 mb-2">
                        <div class="d-flex justify-content-between">
                            <span class="badge bg-info text-dark">${m.day_of_week}</span>
                            <span class="text-primary fw-bold">${m.meal_type}</span>
                        </div>
                        <h5 class="mt-2">${m.dish_name}</h5>
                        <small class="text-muted"><i class="bi bi-fire"></i> ${m.calories || 'N/A'} Calories</small>
                    </div>
                </div>
            `).join('');
        }
        loadMess();
    </script>
</body>
</html>
