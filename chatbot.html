<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hostel AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #chat-window { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: white; }
        .bot-msg { background: #f1f1f1; padding: 10px; border-radius: 10px; margin-bottom: 10px; width: fit-content; }
        .user-msg { background: #18BC9C; color: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; margin-left: auto; width: fit-content; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white">AI Hostel Assistant</div>
                    <div class="card-body">
                        <div id="chat-window">
                            <div class="bot-msg">Hello! I am your AI assistant. How can I help you today?</div>
                        </div>
                        <div class="input-group mt-3">
                            <input type="text" id="userInput" class="form-control" placeholder="Ask me about rules, fees, or rooms...">
                            <button class="btn btn-primary" id="sendBtn">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
