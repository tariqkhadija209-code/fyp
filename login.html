<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - HostelFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2C3E50; }
        .login-card { border-radius: 15px; border: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card login-card p-5 shadow" style="width: 400px;">
        <h2 class="text-center mb-4">Login</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 py-2">Login</button>
        </form>
        <p class="text-center mt-3">New student? <a href="signup.html">Register here</a></p>
    </div>

    <script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        // Form se data nikalna
        const formData = new FormData(e.target);
        
        try {
            // Backend API ko request bhejna
            const response = await fetch('http://127.0.0.1:8000/login', { 
                method: 'POST', 
                body: formData 
            });
            
            const result = await response.json();
            
            if (response.ok) {
                // User ka data local storage mein save karna (Chatbot aur Dashboards ke liye)
                localStorage.setItem('user', JSON.stringify(result));
                
                alert("Login Successful! Redirecting...");

                // ROLE-BASED REDIRECTION (Folder structure ke mutabiq)
                if (result.role === 'Admin') {
                    // Agar file 'admin' folder ke andar hai
                    window.location.href = 'admin/admin_dashboard.html'; 
                } 
                else if (result.role === 'Warden') {
                    // Agar file 'warden' folder ke andar hai
                    window.location.href = 'warden/warden_dashboard.html';
                } 
                else {
                    // Students ki files agar bahar hi hain
                    window.location.href = 'student_dashboard.html';
                }
            } else {
                // Agar email ya password ghalat ho
                alert("Login Failed: " + result.detail);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Server is not responding. Make sure FastAPI is running!");
        }
    };
</script>
