<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fee Payment - HostelFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body { background-color: #f8f9fa; }
        .payment-card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #card-element { 
            padding: 12px; 
            border: 1px solid #ced4da; 
            border-radius: 5px; 
            background: white;
        }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card payment-card p-4">
                    <h3 class="text-center mb-4">Hostel Fee Payment</h3>
                    <div class="mb-3 text-center">
                        <span class="badge bg-primary fs-5">Amount: Rs. 15,000</span>
                    </div>
                    
                    <form id="payment-form">
                        <div class="mb-3">
                            <label class="form-label">Cardholder Name</label>
                            <input type="text" id="card-name" class="form-control" placeholder="Full Name" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Credit or Debit Card</label>
                            <div id="card-element"></div>
                            <div id="card-errors" class="text-danger mt-2 small" role="alert"></div>
                        </div>

                        <button id="submit-button" class="btn btn-success w-100 py-2">
                            Pay Securely via Stripe
                        </button>
                    </form>
                    
                    <a href="student_dashboard.html" class="btn btn-link w-100 mt-2 text-muted">Cancel and Go Back</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
